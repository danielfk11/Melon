groups:
  - name: melonmq
    rules:
      - alert: MelonMQBrokerDown
        expr: up{job="melonmq-broker"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MelonMQ broker is down"
          description: "Prometheus cannot scrape the MelonMQ broker target for more than 1 minute."

      - alert: MelonMQQueueBacklogGrowing
        expr: max(melonmq_queue_pending_messages) > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MelonMQ queue backlog is high"
          description: "At least one queue has more than 1000 pending messages for 5 minutes."

      - alert: MelonMQInFlightMessagesStuck
        expr: max(melonmq_queue_inflight_messages) > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "MelonMQ in-flight messages are high"
          description: "At least one queue has more than 100 in-flight messages for 10 minutes."

      - alert: MelonMQBackpressureActive
        expr: increase(melonmq_messages_rejected_total{reason="backpressure"}[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "MelonMQ is rejecting publishes due to backpressure"
          description: "The broker rejected one or more messages due to queue backpressure in the last 5 minutes."

      - alert: MelonMQProcessingErrors
        expr: increase(melonmq_errors_total[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "MelonMQ processing errors detected"
          description: "The broker recorded one or more processing errors in the last 5 minutes."
